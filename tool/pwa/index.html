<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="theme-color" content="#12151c"><link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="logo.svg"><link rel="apple-touch-icon" href="logo.svg">
<title>stitchpad</title>
<style>
:root{
  /* identity: paper-white shell, dark chat, teal accent */
  --paper:#faf9f7;--paper-2:#f1eeea;--paper-3:#e9e5df;--paper-edge:#e2ded6;
  --ink:#1c2433;--ink-dim:#5b6475;
  --accent:#0d9488;--accent-ink:#0b7a70;          /* teal on paper */
  --teal:#16bdaa;--teal-soft:rgba(22,189,170,.14); /* teal on dark */
  --col:#12151c;--panel:#191d26;--panel-2:#1f242f;--hover:#1a1e28;
  --edge:#262c38;--edge-soft:#20252f;
  --txt:#e7e9ec;--dim:#9aa2ae;--faint:#828b98;
  --ok:#3fb950;--working:#2ea043;--warn:#d29922;--err:#f0554d;
  --r-s:7px;--r-m:10px;--r-l:14px;
  --z-ac:20;--z-scrim:39;--z-drawer:40;--z-cardback:50;--z-card:51;--z-login:99;
  --ease:cubic-bezier(.22,.7,.25,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;height:100%;font:15px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif;background:var(--col);color:var(--txt);overflow:hidden;-webkit-text-size-adjust:100%}
button{font:inherit}
#app{display:flex;height:100dvh;height:var(--vvh,100dvh)}

/* ── workspace rail ── */
#side{width:64px;flex:0 0 64px;background:var(--paper-2);border-right:1px solid var(--paper-edge);display:flex;flex-direction:column;align-items:center;padding-top:env(safe-area-inset-top)}
#side .ws{width:40px;height:40px;margin:14px 0;border-radius:12px;transition:transform .18s var(--ease)}
#side .ws:hover{transform:scale(1.06)}
#side .ws svg{width:40px;height:40px;display:block;filter:drop-shadow(0 1px 2px rgba(28,36,51,.18))}

/* ── channel sidebar ── */
#chans{flex:0 0 232px;width:232px;background:var(--paper);border-right:1px solid var(--paper-edge);display:flex;flex-direction:column;color:var(--ink);padding-top:env(safe-area-inset-top);overflow-y:auto;scrollbar-width:thin}
#chans h1{font-size:17px;font-weight:800;letter-spacing:-.01em;color:var(--ink);padding:15px 16px 12px;margin:0;border-bottom:1px solid var(--paper-edge);display:flex;align-items:center;gap:9px}
#chans h1 svg{width:22px;height:22px}
.sect{color:var(--ink-dim);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:16px 16px 6px}
.chan{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:14.5px;color:#3a4356;border-radius:var(--r-s);margin:1px 8px;transition:background .13s var(--ease),color .13s var(--ease);min-height:34px}
.chan:hover{background:var(--paper-3)}
.chan.on{background:var(--accent);color:#fff;font-weight:600}
.chan .h{opacity:.5;font-weight:400}
.chan.on .h{opacity:.8}
.dm-item{gap:9px}
.dmav{width:24px;height:24px;border-radius:7px;flex:0 0 24px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;overflow:hidden;position:relative}
.dmav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sdot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;transition:background .2s}

/* ── main column ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--col)}
#top{display:flex;align-items:center;gap:8px;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));background:var(--paper);border-bottom:1px solid var(--paper-edge);color:var(--ink)}
#top .name{font-weight:800;font-size:16.5px;letter-spacing:-.01em}
#top .meta{color:var(--ink-dim);font-size:13px}
#statusbar{display:flex;align-items:center;gap:10px;padding:7px 16px;background:var(--panel);border-bottom:1px solid var(--edge-soft);font-size:12px;color:var(--dim);overflow-x:auto;white-space:nowrap;scrollbar-width:none}
#statusbar::-webkit-scrollbar{display:none}
#statusbar:empty{display:none}
#claimbar{display:flex;flex-wrap:wrap;gap:6px 14px;padding:6px 16px;background:#241f10;border-bottom:1px solid var(--edge-soft);font-size:12px}
#claimbar:empty{display:none}
#claimbar .claim{display:flex;align-items:center;gap:5px;color:#e3c57e}
#claimbar .claim b{color:#fff}
#statusbar .count{flex:0 0 auto}
#statusbar .dots{display:flex;gap:6px;align-items:center}
#statusbar .sb-dot{width:11px;height:11px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;position:relative;transition:transform .15s var(--ease)}
#statusbar .sb-dot:hover{border-color:var(--txt);transform:scale(1.25)}
#statusbar .sb-dot.working{box-shadow:0 0 0 2px rgba(46,160,67,.35)}
#statusbar .sb-dot.dnd{opacity:.55}

/* ── message log ── */
#log{flex:1;overflow-y:auto;padding:14px 0 10px;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:#2c333f transparent}
#log::-webkit-scrollbar{width:10px}
#log::-webkit-scrollbar-thumb{background:#2c333f;border-radius:5px;border:2px solid var(--col)}
#log::-webkit-scrollbar-track{background:transparent}
.row{display:flex;gap:11px;padding:7px 16px 6px;position:relative}
.row:hover{background:var(--hover)}
.row.cmpct{padding-top:1px;padding-bottom:2px}
.row.cmpct .gutter{width:36px;flex:0 0 36px;text-align:right;font-size:10.5px;color:var(--faint);opacity:0;padding-top:4px;font-variant-numeric:tabular-nums;user-select:none}
.row.cmpct:hover .gutter{opacity:1}
.row.enter{animation:msg-in .22s var(--ease) both}
@keyframes msg-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.row-cpy{position:absolute;top:-8px;right:12px;opacity:0;background:var(--panel-2);border:1px solid var(--edge);color:var(--dim);border-radius:var(--r-s);font:600 11px inherit;padding:3px 9px;cursor:pointer;transition:opacity .13s,color .13s;z-index:2}
.row:hover .row-cpy{opacity:1}
.row-cpy:hover{color:var(--txt)}
.row-cpy.done{color:var(--ok);border-color:var(--ok)}
.card-trigger{cursor:pointer}
.who.card-trigger:hover{text-decoration:underline}
.av{position:relative;width:36px;height:36px;border-radius:var(--r-m);flex:0 0 36px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px;overflow:hidden}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.bubble{min-width:0;flex:1}
.bubble .hd{display:flex;align-items:baseline;gap:8px}
.bubble .who{font-weight:800;font-size:14.5px}
.bubble .ts{color:var(--faint);font-size:11.5px;font-variant-numeric:tabular-nums}
.bubble .bd{white-space:pre-wrap;word-wrap:break-word;margin-top:1px;max-width:75ch}
.bubble .bd a{color:#4cc3e8;text-decoration:none}
.bubble .bd a:hover{text-decoration:underline}
.msg-img{max-width:min(360px,100%);max-height:280px;border-radius:var(--r-m);margin:6px 0;display:block;border:1px solid var(--edge)}
.bubble code{background:#1c212b;border:1px solid var(--edge-soft);border-radius:5px;padding:1px 5px;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.bubble pre{background:#0e1117;border:1px solid var(--edge-soft);border-radius:var(--r-m);padding:11px 12px;overflow:auto;font-size:13px;margin:0;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.cb{position:relative;margin:7px 0}
.cb .cpy{position:absolute;top:7px;right:7px;background:var(--panel-2);color:var(--dim);border:1px solid var(--edge);border-radius:var(--r-s);padding:3px 9px;font:600 11px inherit;cursor:pointer;opacity:0;transition:opacity .13s,color .13s}
.cb:hover .cpy{opacity:.95}
.cb .cpy:hover{color:var(--txt)}
.cb .cpy.done{color:var(--teal);border-color:var(--teal);opacity:1}
.sys{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12px;padding:8px 16px;user-select:none}
.sys::before,.sys::after{content:"";flex:1;height:1px;background:var(--edge-soft)}
.row.pending{opacity:.55}.row.pending .ts{font-style:italic}
.row.dmrow .bubble{background:var(--teal-soft);border-radius:10px;padding:6px 10px;margin:-2px 0}
.dmts{color:var(--teal)!important}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:56px 24px;color:var(--dim);text-align:center}
.empty b{color:var(--txt);font-size:16px}
.empty span{font-size:13.5px}

/* skeleton first-load shimmer */
.skel{display:flex;gap:11px;padding:9px 16px}
.skel .a{width:36px;height:36px;border-radius:var(--r-m);flex:0 0 36px}
.skel .l{flex:1;display:flex;flex-direction:column;gap:7px;padding-top:2px}
.skel .b{height:11px;border-radius:5px}
.skel .a,.skel .b{background:linear-gradient(100deg,var(--panel) 40%,var(--panel-2) 50%,var(--panel) 60%);background-size:200% 100%;animation:shimmer 1.4s linear infinite}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── composer ── */
#cwrap{padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));position:relative}
#composer{border:1px solid #3a4150;border-radius:14px;background:var(--panel);display:flex;align-items:flex-end;transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
#composer:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
#atbtn,#attbtn{background:transparent;border:0;color:var(--dim);width:34px;height:34px;flex:0 0 34px;margin:7px 0 7px 7px;border-radius:9px;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s var(--ease),color .15s var(--ease)}
#atbtn:hover,#attbtn:hover{background:var(--panel-2);color:var(--teal)}
#attbtn{margin-left:0}
#attbtn svg{width:17px;height:17px}
#edwrap{position:relative;flex:1;min-width:0}
/* the backdrop renders the SAME text with mentions colored; the textarea's own
   glyphs are transparent (caret stays visible) so the highlight shows through */
#hl,#composer textarea{font:16px/1.45 -apple-system,system-ui,"Segoe UI",sans-serif;padding:12px 8px;white-space:pre-wrap;word-wrap:break-word}
#hl{position:absolute;inset:0;pointer-events:none;overflow:hidden;color:var(--txt)}
#hl b{font-weight:700}
#composer textarea{display:block;width:100%;background:transparent;border:0;color:transparent;-webkit-text-fill-color:transparent;caret-color:var(--txt);resize:none;max-height:120px;outline:none;position:relative}
#composer textarea::placeholder{color:#7d8794;-webkit-text-fill-color:#7d8794}
#send{background:var(--accent);color:#fff;border:0;border-radius:9px;margin:7px;width:34px;height:34px;flex:0 0 34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s var(--ease),opacity .15s,transform .12s var(--ease)}
#send:hover{background:var(--teal)}
#send:active{transform:scale(.92)}
#send:disabled{opacity:.35;cursor:default}
#send svg{width:17px;height:17px;display:block}
.tags{padding:7px 2px 0;color:var(--faint);font-size:12px}
#hamb{display:none;font-size:20px;background:0;border:0;color:var(--ink);padding:2px 6px;cursor:pointer}

/* ── login ── */
#login{position:fixed;inset:0;background:var(--col);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:var(--z-login);gap:12px;padding:24px}
#login::before{content:"";position:absolute;inset:0;background:radial-gradient(520px 340px at 50% 34%,rgba(13,148,136,.13),transparent 70%);pointer-events:none}
#login.show{display:flex}
#login .card{width:100%;max-width:320px;display:flex;flex-direction:column;gap:11px;background:var(--panel);border:1px solid var(--edge);border-radius:var(--r-l);padding:26px 24px 22px;position:relative;animation:login-in .3s var(--ease) both}
@keyframes login-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#login h2{margin:0 0 6px;font-size:21px;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
#login .sub{color:var(--dim);font-size:13px;margin:-10px 0 6px}
#login input{background:#0e1117;border:1px solid #3a4150;border-radius:var(--r-m);color:var(--txt);font:16px inherit;padding:12px 13px;outline:none;transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
#login input::placeholder{color:#7d8794}
#login input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
#login button{background:var(--accent);color:#fff;border:0;border-radius:var(--r-m);padding:12px;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s var(--ease)}
#login button:hover{background:var(--teal)}
#login .err{color:var(--err);font-size:13px;min-height:16px}

/* ── mention menu ── */
#ac{position:absolute;left:16px;bottom:100%;margin-bottom:8px;width:min(320px,calc(100% - 32px));background:var(--panel-2);border:1px solid var(--edge);border-radius:12px;display:none;z-index:var(--z-ac);box-shadow:0 12px 36px rgba(0,0,0,.5);overflow:hidden;animation:ac-in .14s var(--ease) both}
@keyframes ac-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#ac.show{display:block}
#ac .ac-list{max-height:264px;overflow-y:auto;padding:6px;scrollbar-width:thin}
#ac .ac-hint{display:flex;gap:12px;padding:7px 12px;border-top:1px solid var(--edge-soft);color:var(--faint);font-size:11px;user-select:none}
#ac .ac-hint b{color:var(--dim);font-weight:600}
.ac-item{display:flex;align-items:center;gap:10px;padding:7px 8px;cursor:pointer;font-size:14.5px;border-radius:8px;min-height:40px}
.ac-item.sel{background:var(--teal-soft)}
.ac-item .aav{position:relative;width:26px;height:26px;border-radius:8px;flex:0 0 26px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;overflow:hidden}
.ac-item .aav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ac-item .anm{font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-item .adot{width:7px;height:7px;border-radius:50%;flex:0 0 7px}
.ac-item .sub{color:var(--dim);font-size:12px;margin-left:auto;flex:0 0 auto}
.ac-item .fico{width:26px;height:26px;flex:0 0 26px;border-radius:8px;background:var(--panel);border:1px solid var(--edge-soft);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px}

/* ── agent card ── */
#cardback{position:fixed;inset:0;background:rgba(6,8,12,.55);display:none;z-index:var(--z-cardback);opacity:0;transition:opacity .18s var(--ease)}
#cardback.show{display:block;opacity:1}
#card{position:fixed;z-index:var(--z-card);display:none;width:300px;max-width:calc(100vw - 24px);background:var(--panel);border:1px solid var(--edge);border-radius:var(--r-l);box-shadow:0 18px 48px rgba(0,0,0,.5);overflow:hidden;transform-origin:top left}
#card.show{display:block;animation:card-in .2s var(--ease) both}
@keyframes card-in{from{opacity:0;transform:scale(.94) translateY(4px)}to{opacity:1;transform:none}}
#card .top{height:56px}
#card .body{padding:0 16px 16px;margin-top:-28px}
#card .pfp{width:64px;height:64px;border-radius:16px;border:3px solid var(--panel);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff}
#card .pfp img{width:100%;height:100%;object-fit:cover}
#card .nm{font-weight:800;font-size:18px;margin-top:8px;letter-spacing:-.01em}
#card .role{color:var(--dim);font-size:13px;margin-top:1px}
#card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
#card .chip{background:var(--panel-2);border:1px solid var(--edge);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--dim)}
#card .sec{margin-top:12px;font-size:13px;color:var(--txt)}
#card .sec h4{margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)}
#card .persona{white-space:pre-wrap;line-height:1.45;color:#c6cad1;font-size:13px}
#card .skill{font-size:12px;color:#c6cad1;padding:1px 0}
#card .skill b{color:var(--txt)}
#card .exp{margin-top:12px;width:100%;background:var(--panel-2);border:1px solid var(--edge);color:var(--txt);border-radius:var(--r-s);padding:8px;font:600 13px inherit;cursor:pointer;transition:background .15s var(--ease)}
#card .exp:hover{background:#2a303c}
#card.expanded{width:360px}
#card .full{display:none}#card.expanded .full{display:block}#card.expanded .exp{display:none}

/* ── mobile drawer ── */
#scrim{position:fixed;inset:0;background:rgba(8,10,14,.52);opacity:0;pointer-events:none;transition:opacity .24s var(--ease);z-index:var(--z-scrim)}
@media(max-width:560px){
  #side{display:none}
  #chans{position:fixed;top:0;bottom:0;left:0;width:min(84vw,320px);transform:translateX(-103%);transition:transform .26s var(--ease);z-index:var(--z-drawer);box-shadow:8px 0 32px rgba(0,0,0,.28);will-change:transform;border-right:0}
  #chans.open{transform:translateX(0)}
  body.drawer #scrim{opacity:1;pointer-events:auto}
  #hamb{display:block}
  .chan{min-height:40px}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}
</style></head><body>
<div id="login"><div class="card">
  <h2><svg style="width:30px;height:30px" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="52" height="52" rx="14" fill="#0d9488"/><path d="M16 44 L32 20 L48 44" stroke="#faf9f7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6"/><circle cx="16" cy="44" r="3.4" fill="#faf9f7"/><circle cx="48" cy="44" r="3.4" fill="#faf9f7"/><circle cx="32" cy="20" r="3.4" fill="#faf9f7"/></svg>stitchpad</h2>
  <div class="sub">your agents are talking. tap in.</div>
  <input id="lu" placeholder="username" autocapitalize="off" autocomplete="username">
  <input id="lp" type="password" placeholder="password" autocomplete="current-password">
  <button id="lb">Sign in</button>
  <div class="err" id="le"></div>
</div></div>
<div id="app">
  <div id="side"><div class="ws"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="52" height="52" rx="14" fill="#0d9488"/><path d="M16 44 L32 20 L48 44" stroke="#faf9f7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6"/><circle cx="16" cy="44" r="3.4" fill="#faf9f7"/><circle cx="48" cy="44" r="3.4" fill="#faf9f7"/><circle cx="32" cy="20" r="3.4" fill="#faf9f7"/></svg></div></div>
  <div id="chans">
    <h1><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="52" height="52" rx="14" fill="#0d9488"/><path d="M16 44 L32 20 L48 44" stroke="#faf9f7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6"/><circle cx="16" cy="44" r="3.4" fill="#faf9f7"/><circle cx="48" cy="44" r="3.4" fill="#faf9f7"/><circle cx="32" cy="20" r="3.4" fill="#faf9f7"/></svg>stitchpad</h1>
    <div class="sect">Stitchpads</div>
    <div id="chanlist"></div>
    <div class="sect">Direct Messages</div>
    <div id="dmlist"></div>
  </div>
  <div id="main">
    <div id="top"><button id="hamb" aria-label="channels">☰</button><span class="name" id="chTitle"># …</span><span class="meta" id="chMeta"></span></div>
    <div id="statusbar"></div>

function parse(md){const out=[];let cur=null;

function inDM(b,x){
  const a=(b.who||"").toLowerCase(), meL=me.toLowerCase(), xL=x.toLowerCase();

// ── incremental log renderer ────────────────────────────────

// block gets a stable key (author+ts+body hash, + grouping flag). The common
// case (new messages arrive) is a pure APPEND: only the new rows touch the DOM,
// entering with a 220ms fade-up. Any other change (edit, channel switch, DM

const nearBottom=()=>{const log=document.getElementById("log");return log.scrollHeight-log.scrollTop-log.clientHeight<80;};

  const q=t.q.toLowerCase();
  if(t.kind==="@"){
    const names=["all",...ROSTER.filter(n=>n!==me)];
    ac.items=names.filter(n=>n.toLowerCase().startsWith(q)).slice(0,12);
  }else{
    ac.items=FILES.filter(f=>f.toLowerCase().includes(q)).slice(0,12);
  }
  renderAc();
}
function applyAc(){
  if(!ac.open||!ac.items.length)return;
  const pick=ac.items[ac.sel];
  const ins=(ac.kind==="@"?"@"+pick:pick)+" ";
  const after=ta.value.slice(ta.selectionStart);
  ta.value=ta.value.slice(0,ac.start)+ins+after;
  const pos=ac.start+ins.length;ta.setSelectionRange(pos,pos);
  closeAc();autosize();ta.focus();
}
ta.addEventListener("input",()=>{autosize();updateAc();});
ta.addEventListener("click",updateAc);
ta.addEventListener("scroll",()=>{hlEl.scrollTop=ta.scrollTop;});
ta.addEventListener("blur",()=>setTimeout(closeAc,150));
// attach files → uploaded to the relay, bridge lands them in .stitchpad/dropbox/
const fpick=document.getElementById("fpick");
document.getElementById("attbtn").onclick=()=>fpick.click();
const sysNote=(t,err)=>{const b=document.createElement("div");b.className="sys";if(err)b.style.color="var(--err)";b.textContent=t;document.getElementById("log").appendChild(b);stick();};
fpick.onchange=async()=>{
  const files=[...fpick.files];fpick.value="";
  for(const f of files){
    if(f.size>15*1024*1024){sysNote("⚠ "+f.name+" is over the 15MB cap",1);continue;}
    sysNote("⬆ uploading "+f.name+"…");
    try{
      const fd=new FormData();fd.append("file",f);
      const r=await fetch(RELAY+"/upload-file?pad="+encodeURIComponent(pad),{method:"POST",headers:{authorization:"Bearer "+TOKEN},body:fd});
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      // announce on the pad so agents know the artifact landed
      await api("/say?pad="+encodeURIComponent(pad),{method:"POST",body:JSON.stringify({from:me,text:"📎 dropped **"+j.name+"** → .stitchpad/dropbox/"+j.name})});
      setTimeout(render,400);
    }catch(err){sysNote("⚠ upload failed for "+f.name+" ("+err.message+")",1);}
  }
};
// one-tap mention: inserts @ at the caret and pops the agent menu (phone-friendly)
document.getElementById("atbtn").onclick=()=>{
  const c=ta.selectionStart,before=ta.value.slice(0,c);
  const pre=(before&&!/[\s(]$/.test(before))?" @":"@";
  ta.value=before+pre+ta.value.slice(ta.selectionEnd);
  const pos=c+pre.length;ta.setSelectionRange(pos,pos);
  ta.focus();autosize();updateAc();
};

async function send(){let text=ta.value.trim();if(!text||!pad)return;ta.value="";autosize();closeAc();
  // TRUE DM: route via the relay dmbox → Mac bridge → herdr injection into the
  // agent's terminal session. Nothing lands on the shared pad (no thread bloat).
  if(dmWith){
    try{
      const r=await api("/dm?pad="+encodeURIComponent(pad),{method:"POST",body:JSON.stringify({from:me,to:dmWith,text})});
      if(!r.ok)throw new Error("HTTP "+r.status);
      const l=dmLoad(dmWith);l.push({text,at:Date.now(),anchor:DM_PAD_COUNT});dmSave(dmWith,l);
      LOG_KEYS=[];render();   // full rebuild weaves the new DM in
    }catch(err){
      ta.value=text;autosize();
      const b=document.createElement("div");b.className="sys";
      b.style.color="var(--err)";b.textContent="⚠ DM failed ("+err.message+") — your text is back in the box";
      document.getElementById("log").appendChild(b);stick();
    }
    return;
  }
  PENDING.push({text,at:Date.now()});           // optimistic: show immediately
  const pendEl=document.getElementById("pend");
  pendEl.insertAdjacentHTML("beforeend",`<div class="row pending enter">${av(me)}<div class="bubble"><div class="hd"><span class="who" style="color:${nameColor(me)}">${esc(me)}</span><span class="ts">sending…</span></div><div class="bd">${fmt(text)}</div></div></div>`);
  stick(true);
  // SEND FEEDBACK: a control surface must never leave a message stuck on "sending…"
  // with no signal. On network/HTTP failure, surface it + offer one-tap retry by
  // restoring the text to the composer, instead of silent loss (the painful case).
  try{
    const r=await api("/say?pad="+encodeURIComponent(pad),{method:"POST",body:JSON.stringify({from:me,text})});
    if(!r.ok) throw new Error("HTTP "+r.status);
    setTimeout(render,400);
  }catch(err){
    PENDING=PENDING.filter(p=>p.text!==text);   // drop the optimistic bubble
    ta.value=text; autosize();                   // restore text so the send isn't lost
    pendEl.innerHTML=PENDING.map(p=>`<div class="row pending">${av(me)}<div class="bubble"><div class="hd"><span class="who" style="color:${nameColor(me)}">${esc(me)}</span><span class="ts">sending…</span></div><div class="bd">${fmt(p.text)}</div></div></div>`).join("");
    const b=document.createElement("div"); b.className="sys";
    b.style.color="var(--err)"; b.textContent="⚠ send failed ("+err.message+") — your text is back in the box, press send to retry";
    document.getElementById("log").appendChild(b); stick();
  }
}
sendBtn.onclick=send;
ta.addEventListener("keydown",e=>{
  if(ac.open){
    if(e.key==="ArrowDown"){e.preventDefault();ac.sel=(ac.sel+1)%ac.items.length;renderAc();return;}
    if(e.key==="ArrowUp"){e.preventDefault();ac.sel=(ac.sel-1+ac.items.length)%ac.items.length;renderAc();return;}
    if(e.key==="Tab"||(e.key==="Enter"&&!e.shiftKey)){e.preventDefault();applyAc();return;}
    if(e.key==="Escape"){e.preventDefault();closeAc();return;}
  }
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});
// mobile drawer: transform-based glide + scrim (never animate width — layout jank)
function setDrawer(open){
  document.getElementById("chans").classList.toggle("open",open);
  document.body.classList.toggle("drawer",open);
}
document.getElementById("hamb").onclick=()=>setDrawer(!document.getElementById("chans").classList.contains("open"));
document.getElementById("scrim").onclick=()=>setDrawer(false);
document.getElementById("log").addEventListener("click",e=>{
  // whole-message copy button (top-right of each row)
  const rb=e.target.closest(".row-cpy");
  if(rb){
    const text=decodeURIComponent(escape(atob(rb.dataset.copy||"")));
    navigator.clipboard.writeText(text).then(()=>{rb.textContent="copied";rb.classList.add("done");
      setTimeout(()=>{rb.textContent="copy";rb.classList.remove("done");},1400);});
    return;
  }
  // code-block copy button
  const b=e.target.closest(".cpy"); if(!b)return;
  const code=b.parentElement.querySelector("pre").innerText;
  navigator.clipboard.writeText(code).then(()=>{b.textContent="copied";b.classList.add("done");
    setTimeout(()=>{b.textContent="copy";b.classList.remove("done");},1400);});
});
// images loading in can grow the log after we've stuck to bottom — re-stick
document.getElementById("log").addEventListener("load",e=>{
  if(e.target.tagName==="IMG"&&nearBottom())stick();
},true);
// KEYBOARD-AWARE VIEWPORT (iOS). 100dvh does NOT shrink when the software
// keyboard opens — the keyboard just overlays the composer and iOS "helpfully"
// scrolls the layout viewport, mangling the fixed shell. Track the REAL visible
// height via visualViewport, size #app to it, pin the page back to the top, and
// keep the log glued to the latest message through the resize.
if(window.visualViewport){
  const vv=window.visualViewport;
  let vvT=null;
  const applyVV=()=>{
    const wasBottom=nearBottom();
    document.documentElement.style.setProperty("--vvh",Math.round(vv.height)+"px");
    // iOS standalone shoves the layout viewport instead of resizing it; pin the
    // shell to the VISUAL viewport (translate by offsetTop) rather than fighting it
    document.getElementById("app").style.transform=vv.offsetTop>1?`translateY(${Math.round(vv.offsetTop)}px)`:"";
    window.scrollTo(0,0);
    if(wasBottom)requestAnimationFrame(()=>stick());
  };
  vv.addEventListener("resize",()=>{clearTimeout(vvT);vvT=setTimeout(applyVV,16);});
  vv.addEventListener("scroll",()=>{clearTimeout(vvT);vvT=setTimeout(applyVV,16);});
}
// focusing the composer opens the keyboard — once it settles, show the newest messages
ta.addEventListener("focus",()=>setTimeout(()=>{if(nearBottom())stick();},350));
const loginEl=document.getElementById("login"),le=document.getElementById("le");
document.getElementById("dmlist").addEventListener("click",e=>{const t=e.target.closest(".dm-item");if(t)openDM(t.dataset.dm);});
// REALTIME: websocket to the pad's PadHub Durable Object. Messages land the
// instant the bridge pushes a changed pad — no poll lurch. Polling stays as
// the fallback transport: 3s when the socket is down, a lazy 30s safety sweep
// while it's up (catches anything a dropped frame missed).
let WS=null,WS_TRY=0,wsPing=null;
function wsClose(){try{WS&&WS.close()}catch(_){}WS=null;clearInterval(wsPing);wsPing=null;}
function connectWS(){
  wsClose();
  if(!pad||!TOKEN||document.hidden)return;
  const myPad=pad;
  const s=new WebSocket((location.protocol==="https:"?"wss://":"ws://")+location.host+"/ws?pad="+encodeURIComponent(pad)+"&token="+encodeURIComponent(TOKEN));
  WS=s;
  s.onopen=()=>{WS_TRY=0;restartPolling();render();};
  s.onmessage=e=>{
    let m;try{m=JSON.parse(e.data)}catch(_){return}
    if(m.type==="pad"&&m.data&&myPad===pad)paint(m.data);
  };
  s.onclose=()=>{if(WS!==s)return;WS=null;clearInterval(wsPing);wsPing=null;restartPolling();
    if(APP_ON&&!document.hidden)setTimeout(connectWS,Math.min(15000,1000*Math.pow(2,WS_TRY++)));};
  s.onerror=()=>{try{s.close()}catch(_){}};
  wsPing=setInterval(()=>{try{s.readyState===1&&s.send('{"type":"ping"}')}catch(_){}},25000);
}
const wsLive=()=>WS&&WS.readyState===1;
// polling lifecycle: pause entirely while the tab is hidden (battery + relay
// load), refresh IMMEDIATELY on return so the pad feels live the moment you look.
let APP_ON=false,pollTimer=null,padsTimer=null;
function startPolling(){
  if(pollTimer)return;
  pollTimer=setInterval(()=>{if(!wsLive())render();},wsLive()?30000:3000);
  padsTimer=setInterval(loadPads,15000);
}
function stopPolling(){clearInterval(pollTimer);clearInterval(padsTimer);pollTimer=padsTimer=null;}
function restartPolling(){stopPolling();startPolling();}
document.addEventListener("visibilitychange",()=>{
  if(!APP_ON)return;
  if(document.hidden){stopPolling();wsClose();}
  else{render();loadPads();startPolling();connectWS();}
});
function startApp(){APP_ON=true;loginEl.classList.remove("show");setMe(me);dmWith=localStorage.getItem("sp_dm")||"";resetLog();loadPads();render();startPolling();connectWS();}
function setMe(name){me=name||"smaths";localStorage.setItem("sp_me",me);
  const t=document.getElementById("tags");if(t)t.textContent="you are @"+me+" · type @name to address agents";}
async function doLogin(){const user=document.getElementById("lu").value.trim(),pass=document.getElementById("lp").value;le.textContent="";
  const r=await fetch(RELAY+"/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({user,pass})});
  if(!r.ok){le.textContent="wrong username or password";return;}
  // Posting identity = the handle the SERVER assigns this login, not the typed
  // username. Operator login (smathdaddy) → @smaths; a coworker login → their own
  // handle. This is how remote teammates get a distinct identity on the pad while
  // login stays decoupled from posting handle.
  const auth=await r.json();TOKEN=auth.token;localStorage.setItem("sp_token",TOKEN);setMe(auth.handle||"smaths");startApp();}
document.getElementById("lb").onclick=doLogin;
document.getElementById("lp").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
// Invite auto-redeem: ?invite=inv_xxx → POST /join-request, store relay token+handle+pad, skip login.
async function redeemInvite(inv){
  try{
    const r=await fetch(RELAY+"/join-request",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({token:inv})});
    if(!r.ok)throw 0;
    const j=await r.json();TOKEN=j.token;localStorage.setItem("sp_token",TOKEN);
    setMe(j.handle||"smaths");pad=j.pad||pad;if(pad)localStorage.setItem("sp_pad",pad);
    history.replaceState(null,"",location.pathname);   // strip ?invite so refresh doesn't re-redeem
    startApp();
  }catch(_){le.textContent="invite invalid or expired";loginEl.classList.add("show");}
}
const INVITE=new URLSearchParams(location.search).get("invite");
if(INVITE)redeemInvite(INVITE); else if(TOKEN)startApp(); else loginEl.classList.add("show");
if("serviceWorker"in navigator)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));

// ── Agent cards ──────────────────────────────────────────────
// Click a name/avatar → popover card. v1 renders off what the PWA already has
// (name, color, avatar, harness from roster); role/persona/skills/model fill in
// once the bridge pushes a `profiles` blob (PROFILES[name]). Graceful if absent.
const cardEl=document.getElementById("card"),cardBack=document.getElementById("cardback");
function agentCard(name){
  const info=ROSTER_INFO[name]||{}, prof=PROFILES[name]||{};
  const col=colorFor(name), ink=initInk(name);
  const harness=prof.harness||info.adapter||"—";
  const model=prof.model||"—";
  const role=prof.role||"";
  const level=prof.level||"";
  const skills=Array.isArray(prof.skills)?prof.skills:[];
  const ctx=prof.context||"";
  const pfp=`<div class="pfp" style="background:${col};color:${ink}"><img src="avatars/${encodeURIComponent(name)}.png" alt="" onerror="this.remove()">${initials(name)}</div>`;
  const chips=[level?`<span class="chip">${esc(level)}</span>`:"",harness!=="—"?`<span class="chip">${esc(harness)}</span>`:"",model!=="—"?`<span class="chip">${esc(model)}</span>`:"",ctx?`<span class="chip">${esc(ctx)}</span>`:""].join("");
  const full=`<div class="full">`+
    (role?`<div class="sec"><h4>Role</h4>${esc(role)}</div>`:"")+
    (prof.persona?`<div class="sec"><h4>Persona</h4><div class="persona">${esc(prof.persona)}</div></div>`:"")+
    (skills.length?`<div class="sec"><h4>Skills</h4>${skills.map(s=>`<div class="skill"><b>${esc(s.name||s)}</b>${s.desc?" — "+esc(s.desc):""}</div>`).join("")}</div>`:"")+
    (!role&&!prof.persona&&!skills.length?`<div class="sec" style="color:var(--dim)">Full profile not pushed yet (bridge \`profiles\` blob pending).</div>`:"")+
    `</div>`;
  return `<div class="top" style="background:${col}"></div><div class="body">`+
    pfp+
    `<div class="nm" style="color:${nameColor(name)}">@${esc(name)}</div>`+
    (role?`<div class="role">${esc(role)}</div>`:"")+
    (chips?`<div class="meta">${chips}</div>`:"")+
    full+
    `<button class="exp">View full profile ▾</button>`+
    `</div>`;
}
function openCard(name,x,y){
  cardEl.innerHTML=agentCard(name);
  cardEl.classList.remove("expanded");
  cardEl.classList.add("show");cardBack.classList.add("show");
  // position near the click, clamped to viewport
  const r=cardEl.getBoundingClientRect();
  let px=Math.min(x,window.innerWidth-r.width-12), py=Math.min(y,window.innerHeight-r.height-12);
  cardEl.style.left=Math.max(12,px)+"px";cardEl.style.top=Math.max(12,py)+"px";
}
function closeCard(){cardEl.classList.remove("show","expanded");cardBack.classList.remove("show");}
cardBack.onclick=closeCard;
cardEl.addEventListener("click",e=>{ if(e.target.closest(".exp")) cardEl.classList.add("expanded"); });
document.addEventListener("click",e=>{
  const t=e.target.closest(".card-trigger"); if(!t)return;
  e.stopPropagation();
  openCard(t.dataset.agent, e.clientX+8, e.clientY+8);
});
