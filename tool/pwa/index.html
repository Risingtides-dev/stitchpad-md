<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="theme-color" content="#12151c"><link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="logo.svg"><link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>stitchpad</title>
<style>
:root{
  /* identity: paper-white shell, dark chat, teal accent */
  --paper:#faf9f7;--paper-2:#f1eeea;--paper-3:#e9e5df;--paper-edge:#e2ded6;
  --ink:#1c2433;--ink-dim:#5b6475;
  --accent:#0d9488;--accent-ink:#0b7a70;          /* teal on paper */
  --teal:#16bdaa;--teal-soft:rgba(22,189,170,.14); /* teal on dark */
  --col:#12151c;--panel:#191d26;--panel-2:#1f242f;--hover:#1a1e28;
  --edge:#262c38;--edge-soft:#20252f;
  --txt:#e7e9ec;--dim:#9aa2ae;--faint:#828b98;
  --ok:#3fb950;--working:#2ea043;--warn:#d29922;--err:#f0554d;
  --r-s:7px;--r-m:10px;--r-l:14px;
  --z-ac:20;--z-scrim:39;--z-drawer:40;--z-cardback:50;--z-card:51;--z-login:99;
  --ease:cubic-bezier(.22,.7,.25,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;height:100%;font:15px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif;background:var(--col);color:var(--txt);overflow:hidden;-webkit-text-size-adjust:100%}
button{font:inherit}
#app{display:flex;height:100dvh;height:var(--vvh,100dvh)}

/* ── workspace rail ── */
#side{width:64px;flex:0 0 64px;background:var(--paper-2);border-right:1px solid var(--paper-edge);display:flex;flex-direction:column;align-items:center;padding-top:env(safe-area-inset-top)}
#side .ws{width:40px;height:40px;margin:14px 0;border-radius:12px;transition:transform .18s var(--ease)}
#side .ws:hover{transform:scale(1.06)}
#side .ws svg{width:40px;height:40px;display:block;filter:drop-shadow(0 1px 2px rgba(28,36,51,.18))}

/* ── channel sidebar ── */
#chans{flex:0 0 232px;width:232px;background:var(--paper);border-right:1px solid var(--paper-edge);display:flex;flex-direction:column;color:var(--ink);padding-top:env(safe-area-inset-top);overflow-y:auto;scrollbar-width:thin}
#chans h1{font-size:17px;font-weight:800;letter-spacing:-.01em;color:var(--ink);padding:15px 16px 12px;margin:0;border-bottom:1px solid var(--paper-edge);display:flex;align-items:center;gap:9px}
#chans h1 svg{width:22px;height:22px}
.sect{color:var(--ink-dim);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:16px 16px 6px}
.chan{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:14.5px;color:#3a4356;border-radius:var(--r-s);margin:1px 8px;transition:background .13s var(--ease),color .13s var(--ease);min-height:34px}
.chan:hover{background:var(--paper-3)}
.chan.on{background:var(--accent);color:#fff;font-weight:600}
.chan .h{opacity:.5;font-weight:400}
.chan.on .h{opacity:.8}
.dm-item{gap:9px}
.dmav{width:24px;height:24px;border-radius:7px;flex:0 0 24px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;overflow:hidden;position:relative}
.dmav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sdot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;transition:background .2s}

/* ── main column ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--col)}
#top{display:flex;align-items:center;gap:8px;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));background:var(--paper);border-bottom:1px solid var(--paper-edge);color:var(--ink)}
#top .name{font-weight:800;font-size:16.5px;letter-spacing:-.01em}
#top .meta{color:var(--ink-dim);font-size:13px}
#statusbar{display:flex;align-items:center;gap:10px;padding:7px 16px;background:var(--panel);border-bottom:1px solid var(--edge-soft);font-size:12px;color:var(--dim);overflow-x:auto;white-space:nowrap;scrollbar-width:none}
#statusbar::-webkit-scrollbar{display:none}
#statusbar:empty{display:none}
#claimbar{display:flex;flex-wrap:wrap;gap:6px 14px;padding:6px 16px;background:#241f10;border-bottom:1px solid var(--edge-soft);font-size:12px}
#claimbar:empty{display:none}
#claimbar .claim{display:flex;align-items:center;gap:5px;color:#e3c57e}
#claimbar .claim b{color:#fff}
#statusbar .count{flex:0 0 auto}
#statusbar .dots{display:flex;gap:7px;align-items:center}
/* presence: mini harness-logo tiles with a status pip (was plain color dots) */
.sb-av{position:relative;display:inline-flex;cursor:pointer;transition:transform .15s var(--ease)}
.sb-av:hover{transform:scale(1.22)}
.sb-av.offline{opacity:.45;filter:grayscale(1)}
.sb-av.dnd{opacity:.7}
.sb-av.working .sb-tile{box-shadow:0 0 0 2px rgba(46,160,67,.4)}
.sb-tile{position:relative;width:18px;height:18px;border-radius:6px;flex:0 0 18px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;overflow:hidden}
.sb-tile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sb-av .st{position:absolute;right:-3px;bottom:-3px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--panel);z-index:1}

/* ── message log ── */
#log{flex:1;overflow-y:auto;padding:14px 0 10px;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:#2c333f transparent}
#log::-webkit-scrollbar{width:10px}
#log::-webkit-scrollbar-thumb{background:#2c333f;border-radius:5px;border:2px solid var(--col)}
#log::-webkit-scrollbar-track{background:transparent}
.row{display:flex;gap:11px;padding:7px 16px 6px;position:relative}
.row:hover{background:var(--hover)}
.row.cmpct{padding-top:1px;padding-bottom:2px}
.row.cmpct .gutter{width:36px;flex:0 0 36px;text-align:right;font-size:10.5px;color:var(--faint);opacity:0;padding-top:4px;font-variant-numeric:tabular-nums;user-select:none}
.row.cmpct:hover .gutter{opacity:1}
.row.enter{animation:msg-in .22s var(--ease) both}
@keyframes msg-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.row-cpy{position:absolute;top:-8px;right:12px;opacity:0;background:var(--panel-2);border:1px solid var(--edge);color:var(--dim);border-radius:var(--r-s);font:600 11px inherit;padding:3px 9px;cursor:pointer;transition:opacity .13s,color .13s;z-index:2}
.row:hover .row-cpy{opacity:1}
.row-cpy:hover{color:var(--txt)}
.row-cpy.done{color:var(--ok);border-color:var(--ok)}
.card-trigger{cursor:pointer}
.who.card-trigger:hover{text-decoration:underline}
.av{position:relative;width:36px;height:36px;border-radius:var(--r-m);flex:0 0 36px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px;overflow:hidden}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.bubble{min-width:0;flex:1}
.bubble .hd{display:flex;align-items:baseline;gap:8px}
.bubble .who{font-weight:800;font-size:14.5px}
.bubble .ts{color:var(--faint);font-size:11.5px;font-variant-numeric:tabular-nums}
.bubble .bd{white-space:pre-wrap;word-wrap:break-word;margin-top:1px;max-width:75ch}
.bubble .bd a{color:#4cc3e8;text-decoration:none}
.bubble .bd a:hover{text-decoration:underline}
.msg-img{max-width:min(360px,100%);max-height:280px;border-radius:var(--r-m);margin:6px 0;display:block;border:1px solid var(--edge)}
.bubble code{background:#1c212b;border:1px solid var(--edge-soft);border-radius:5px;padding:1px 5px;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.bubble pre{background:#0e1117;border:1px solid var(--edge-soft);border-radius:var(--r-m);padding:11px 12px;overflow:auto;font-size:13px;margin:0;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.cb{position:relative;margin:7px 0}
.cb .cpy{position:absolute;top:7px;right:7px;background:var(--panel-2);color:var(--dim);border:1px solid var(--edge);border-radius:var(--r-s);padding:3px 9px;font:600 11px inherit;cursor:pointer;opacity:0;transition:opacity .13s,color .13s}
.cb:hover .cpy{opacity:.95}
.cb .cpy:hover{color:var(--txt)}
.cb .cpy.done{color:var(--teal);border-color:var(--teal);opacity:1}
.sys{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12px;padding:8px 16px;user-select:none}
.sys::before,.sys::after{content:"";flex:1;height:1px;background:var(--edge-soft)}
.row.pending{opacity:.55}.row.pending .ts{font-style:italic}
.row.dmrow .bubble{background:var(--teal-soft);border-radius:10px;padding:6px 10px;margin:-2px 0}
.dmts{color:var(--teal)!important}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:56px 24px;color:var(--dim);text-align:center}
.empty b{color:var(--txt);font-size:16px}
.empty span{font-size:13.5px}

/* skeleton first-load shimmer */
.skel{display:flex;gap:11px;padding:9px 16px}
.skel .a{width:36px;height:36px;border-radius:var(--r-m);flex:0 0 36px}
.skel .l{flex:1;display:flex;flex-direction:column;gap:7px;padding-top:2px}
.skel .b{height:11px;border-radius:5px}
.skel .a,.skel .b{background:linear-gradient(100deg,var(--panel) 40%,var(--panel-2) 50%,var(--panel) 60%);background-size:200% 100%;animation:shimmer 1.4s linear infinite}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── composer ── */
#cwrap{padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));position:relative}
#composer{border:1px solid #3a4150;border-radius:14px;background:var(--panel);display:flex;align-items:flex-end;transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
#composer:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
#atbtn,#attbtn{background:transparent;border:0;color:var(--dim);width:34px;height:34px;flex:0 0 34px;margin:7px 0 7px 7px;border-radius:9px;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s var(--ease),color .15s var(--ease)}
#atbtn:hover,#attbtn:hover{background:var(--panel-2);color:var(--teal)}
#attbtn{margin-left:0}
#attbtn svg{width:17px;height:17px}
#edwrap{position:relative;flex:1;min-width:0}
/* the backdrop renders the SAME text with mentions colored; the textarea's own
   glyphs are transparent (caret stays visible) so the highlight shows through */
#hl,#composer textarea{font:16px/1.45 -apple-system,system-ui,"Segoe UI",sans-serif;padding:12px 8px;white-space:pre-wrap;word-wrap:break-word}
#hl{position:absolute;inset:0;pointer-events:none;overflow:hidden;color:var(--txt)}
#hl b{font-weight:700}
#composer textarea{display:block;width:100%;background:transparent;border:0;color:transparent;-webkit-text-fill-color:transparent;caret-color:var(--txt);resize:none;max-height:120px;outline:none;position:relative}
#composer textarea::placeholder{color:#7d8794;-webkit-text-fill-color:#7d8794}
#send{background:var(--accent);color:#fff;border:0;border-radius:9px;margin:7px;width:34px;height:34px;flex:0 0 34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s var(--ease),opacity .15s,transform .12s var(--ease)}
#send:hover{background:var(--teal)}
#send:active{transform:scale(.92)}
#send:disabled{opacity:.35;cursor:default}
#send svg{width:17px;height:17px;display:block}
.tags{padding:7px 2px 0;color:var(--faint);font-size:12px}
#hamb{display:none;font-size:20px;background:0;border:0;color:var(--ink);padding:2px 6px;cursor:pointer}
.seg{margin-left:auto;display:flex;gap:2px;background:var(--paper-2);border:1px solid var(--paper-edge);border-radius:9px;padding:2px}
.seg button{background:transparent;border:0;border-radius:7px;color:var(--ink-dim);font-size:12.5px;font-weight:600;padding:4px 10px;cursor:pointer;transition:background .15s var(--ease),color .15s var(--ease)}
.seg button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(28,36,51,.1)}
.termview{margin:0;padding:14px 16px;font:11.5px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;word-break:break-word;color:#c8cdd4;background:#0e1117;min-height:100%}
#sumbtn{margin-left:auto;display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--paper-edge);border-radius:9px;color:var(--ink-dim);font-size:13px;font-weight:600;padding:5px 10px;cursor:pointer;transition:background .15s var(--ease),color .15s var(--ease)}
#sumbtn:hover{background:var(--paper-3);color:var(--accent-ink)}
#sumbtn:disabled{opacity:.55;cursor:default}
@media(max-width:560px){#sumbtn .lbl{display:none}}
.sum-panel{position:fixed;right:16px;bottom:calc(86px + env(safe-area-inset-bottom));width:min(420px,calc(100vw - 32px));max-height:60vh;overflow-y:auto;background:var(--panel-2);border:1px solid var(--edge);border-radius:var(--r-l);box-shadow:0 18px 48px rgba(0,0,0,.55);z-index:45;padding:15px 16px;animation:card-in .2s var(--ease) both}
.sum-panel h3{margin:0 0 8px;font-size:14px;display:flex;align-items:center;gap:8px;color:var(--txt)}
.sum-panel h3 .sub{color:var(--dim);font-weight:400;font-size:12.5px}
.sum-panel .x{margin-left:auto;background:transparent;border:0;color:var(--dim);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:6px}
.sum-panel .x:hover{color:var(--txt);background:var(--panel)}
.sum-panel .body{font-size:13.5px;line-height:1.55;white-space:pre-wrap;color:#d3d8de}

/* ── delivery receipts + doctor ── */
.receipt{margin-top:3px;font-size:11px;color:var(--dim);letter-spacing:.02em}
.receipt.ok{color:#3fb950}
.receipt.bad{color:var(--err)}
#docbtn{margin-left:auto;display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--paper-edge);border-radius:9px;color:var(--ink-dim);font-size:13px;font-weight:600;padding:5px 10px;cursor:pointer;transition:background .15s var(--ease),color .15s var(--ease)}
#docbtn:hover{background:var(--paper-3);color:var(--accent-ink)}
#docbtn + #sumbtn{margin-left:8px}
@media(max-width:560px){#docbtn .lbl{display:none}}
.doc-panel .body{white-space:normal}
.doc-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--edge)}
.doc-row:last-of-type{border-bottom:0}
.doc-main{flex:1;min-width:0}
.doc-name{display:flex;align-items:baseline;gap:8px;font-size:13.5px}
.doc-sub{color:var(--dim);font-size:11.5px}
.doc-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.doc-chips .chip{background:var(--panel);border:1px solid var(--edge);border-radius:6px;padding:2px 8px;font-size:11.5px;color:var(--dim)}
.doc-chips .chip.ok{color:#3fb950;border-color:rgba(63,185,80,.35)}
.doc-chips .chip.warn{color:#d29922;border-color:rgba(210,153,34,.35)}
.doc-chips .chip.bad{color:var(--err);border-color:rgba(248,81,73,.4)}
.doc-foot{margin-top:9px;font-size:11.5px;color:var(--dim)}
.doc-foot.bad{color:var(--err)}
.doc-empty{color:var(--dim);font-size:13px;padding:8px 0}

/* ── login ── */
#login{position:fixed;inset:0;background:var(--col);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:var(--z-login);gap:12px;padding:24px}
#login::before{content:"";position:absolute;inset:0;background:radial-gradient(520px 340px at 50% 34%,rgba(13,148,136,.13),transparent 70%);pointer-events:none}
#login.show{display:flex}
#login .card{width:100%;max-width:320px;display:flex;flex-direction:column;gap:11px;background:var(--panel);border:1px solid var(--edge);border-radius:var(--r-l);padding:26px 24px 22px;position:relative;animation:login-in .3s var(--ease) both}
@keyframes login-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#login h2{margin:0 0 6px;font-size:21px;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
#login .sub{color:var(--dim);font-size:13px;margin:-10px 0 6px}
#login input{background:#0e1117;border:1px solid #3a4150;border-radius:var(--r-m);color:var(--txt);font:16px inherit;padding:12px 13px;outline:none;transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
#login input::placeholder{color:#7d8794}
#login input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
#login button{background:var(--accent);color:#fff;border:0;border-radius:var(--r-m);padding:12px;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s var(--ease)}
#login button:hover{background:var(--teal)}
#login .err{color:var(--err);font-size:13px;min-height:16px}

/* ── mention menu ── */
#ac{position:absolute;left:16px;bottom:100%;margin-bottom:8px;width:min(320px,calc(100% - 32px));background:var(--panel-2);border:1px solid var(--edge);border-radius:12px;display:none;z-index:var(--z-ac);box-shadow:0 12px 36px rgba(0,0,0,.5);overflow:hidden;animation:ac-in .14s var(--ease) both}
@keyframes ac-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#ac.show{display:block}
#ac .ac-list{max-height:264px;overflow-y:auto;padding:6px;scrollbar-width:thin}
#ac .ac-hint{display:flex;gap:12px;padding:7px 12px;border-top:1px solid var(--edge-soft);color:var(--faint);font-size:11px;user-select:none}
#ac .ac-hint b{color:var(--dim);font-weight:600}
.ac-item{display:flex;align-items:center;gap:10px;padding:7px 8px;cursor:pointer;font-size:14.5px;border-radius:8px;min-height:40px}
.ac-item.sel{background:var(--teal-soft)}
.ac-item .aav{position:relative;width:26px;height:26px;border-radius:8px;flex:0 0 26px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;overflow:hidden}
.ac-item .aav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ac-item .anm{font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-item .adot{width:7px;height:7px;border-radius:50%;flex:0 0 7px}
.ac-item .sub{color:var(--dim);font-size:12px;margin-left:auto;flex:0 0 auto}
.ac-item .fico{width:26px;height:26px;flex:0 0 26px;border-radius:8px;background:var(--panel);border:1px solid var(--edge-soft);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px}

/* ── agent card ── */
#cardback{position:fixed;inset:0;background:rgba(6,8,12,.55);display:none;z-index:var(--z-cardback);opacity:0;transition:opacity .18s var(--ease)}
#cardback.show{display:block;opacity:1}
#card{position:fixed;z-index:var(--z-card);display:none;width:300px;max-width:calc(100vw - 24px);background:var(--panel);border:1px solid var(--edge);border-radius:var(--r-l);box-shadow:0 18px 48px rgba(0,0,0,.5);overflow:hidden;transform-origin:top left}
#card.show{display:block;animation:card-in .2s var(--ease) both}
@keyframes card-in{from{opacity:0;transform:scale(.94) translateY(4px)}to{opacity:1;transform:none}}
#card .top{height:56px}
#card .body{padding:0 16px 16px;margin-top:-28px}
#card .pfp{width:64px;height:64px;border-radius:16px;border:3px solid var(--panel);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff}
#card .pfp img{width:100%;height:100%;object-fit:cover}
#card .nm{font-weight:800;font-size:18px;margin-top:8px;letter-spacing:-.01em}
#card .role{color:var(--dim);font-size:13px;margin-top:1px}
#card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
#card .chip{background:var(--panel-2);border:1px solid var(--edge);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--dim)}
#card .sec{margin-top:12px;font-size:13px;color:var(--txt)}
#card .sec h4{margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)}
#card .persona{white-space:pre-wrap;line-height:1.45;color:#c6cad1;font-size:13px}
#card .skill{font-size:12px;color:#c6cad1;padding:1px 0}
#card .skill b{color:var(--txt)}
#card .exp{margin-top:12px;width:100%;background:var(--panel-2);border:1px solid var(--edge);color:var(--txt);border-radius:var(--r-s);padding:8px;font:600 13px inherit;cursor:pointer;transition:background .15s var(--ease)}
#card .exp:hover{background:#2a303c}
#card.expanded{width:360px}
#card .full{display:none}#card.expanded .full{display:block}#card.expanded .exp{display:none}

/* ── mobile drawer ── */
#scrim{position:fixed;inset:0;background:rgba(8,10,14,.52);opacity:0;pointer-events:none;transition:opacity .24s var(--ease);z-index:var(--z-scrim)}
@media(max-width:560px){
  #side{display:none}
