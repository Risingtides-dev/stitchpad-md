<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1d29"><link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="logo.svg"><link rel="apple-touch-icon" href="logo.svg">
<title>stitchpad</title>
<style>
:root{
  /* paper-white shell, dark chat, teal accent */
  --paper:#faf9f7;--paper-2:#f1efea;--paper-edge:#e3e0d9;--ink:#0f172a;--ink-dim:#64748b;
  --accent:#0d9488;--accent-ink:#0b7a70;
  --col:#1a1d29;--panel:#222529;--hover:#27292e;--edge:#2c2f36;--txt:#e8e8e9;--dim:#9a9ca1;--active:#0d9488;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;font:15px/1.46 -apple-system,system-ui,"Segoe UI",sans-serif;background:var(--col);color:var(--txt);overflow:hidden}
#app{display:flex;height:100dvh}
#side{width:64px;flex:0 0 64px;background:var(--paper-2);border-right:1px solid var(--paper-edge);display:flex;flex-direction:column;align-items:center;padding-top:env(safe-area-inset-top)}
#side .ws{width:40px;height:40px;margin:12px 0}
#side .ws svg{width:40px;height:40px;display:block}
#chans{flex:0 0 230px;width:230px;background:var(--paper);border-right:1px solid var(--paper-edge);display:flex;flex-direction:column;color:var(--ink);padding-top:env(safe-area-inset-top)}
#chans h1{font-size:18px;font-weight:800;color:var(--ink);padding:14px 16px 10px;margin:0;border-bottom:1px solid var(--paper-edge);display:flex;align-items:center;gap:8px}
#chans h1 svg{width:22px;height:22px}
.sect{color:var(--ink-dim);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:14px 16px 4px}
.chan{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;font-size:15px;color:#334155;border-radius:6px;margin:0 6px}
.chan:hover{background:var(--paper-2)}
.chan.on{background:var(--accent);color:#fff;font-weight:600}
.chan .h{opacity:.55;font-weight:400}
.dm-item{gap:8px}
.dmav{width:22px;height:22px;border-radius:6px;flex:0 0 22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;overflow:hidden;position:relative}
.dmav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sdot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--col)}
#top{display:flex;align-items:center;gap:8px;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));background:var(--paper);border-bottom:1px solid var(--paper-edge);color:var(--ink)}
#top .name{font-weight:800;font-size:17px}#top .meta{color:var(--ink-dim);font-size:13px}
#statusbar{display:flex;align-items:center;gap:10px;padding:6px 16px;background:var(--panel);border-bottom:1px solid var(--edge);font-size:12px;color:var(--dim);overflow-x:auto;white-space:nowrap}
#statusbar:empty{display:none}
#claimbar{display:flex;flex-wrap:wrap;gap:6px;padding:5px 16px;background:#2a2410;border-bottom:1px solid var(--edge);font-size:12px}
#claimbar:empty{display:none}
#claimbar .claim{display:flex;align-items:center;gap:5px;color:#e8c97a}
#claimbar .claim b{color:#fff}
#statusbar .count{flex:0 0 auto}
#statusbar .dots{display:flex;gap:5px;align-items:center}
#statusbar .sb-dot{width:11px;height:11px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;position:relative}
#statusbar .sb-dot:hover{border-color:var(--txt)}
#statusbar .sb-dot.working{box-shadow:0 0 0 2px rgba(46,160,67,.35)}
#statusbar .sb-dot.dnd{opacity:.55}
#log{flex:1;overflow-y:auto;padding:12px 0 8px}
.row{display:flex;gap:10px;padding:7px 16px;position:relative}
.row:hover{background:var(--hover)}
.row-cpy{position:absolute;top:4px;right:8px;opacity:0;background:var(--panel);border:1px solid var(--edge);color:var(--dim);border-radius:6px;font:11px inherit;padding:2px 8px;cursor:pointer;transition:opacity .12s;z-index:2}
.row:hover .row-cpy{opacity:1}
.row-cpy:hover{color:var(--txt)}
.row-cpy.done{color:#2ea043;border-color:#2ea043}
.card-trigger{cursor:pointer}
.who.card-trigger:hover{text-decoration:underline}
#cardback{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:50}
#cardback.show{display:block}
#card{position:fixed;z-index:51;display:none;width:300px;max-width:calc(100vw - 24px);background:var(--panel);border:1px solid var(--edge);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);overflow:hidden}
#card.show{display:block}
#card .top{height:56px}
#card .body{padding:0 16px 16px;margin-top:-28px}
#card .pfp{width:64px;height:64px;border-radius:16px;border:3px solid var(--panel);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff}
#card .pfp img{width:100%;height:100%;object-fit:cover}
#card .nm{font-weight:800;font-size:18px;margin-top:8px}
#card .role{color:var(--dim);font-size:13px;margin-top:1px}
#card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
#card .chip{background:#2c2f36;border:1px solid var(--edge);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--dim)}
#card .sec{margin-top:12px;font-size:13px;color:var(--txt)}
#card .sec h4{margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--dim)}
#card .persona{white-space:pre-wrap;line-height:1.4;color:#c9ccd1;font-size:13px}
#card .skill{font-size:12px;color:#c9ccd1;padding:1px 0}
#card .skill b{color:var(--txt)}
#card .exp{margin-top:12px;width:100%;background:#2c2f36;border:1px solid var(--edge);color:var(--txt);border-radius:8px;padding:8px;font:13px inherit;font-weight:600;cursor:pointer}
#card .exp:hover{background:#363a42}
#card.expanded{width:360px}
#card .full{display:none}#card.expanded .full{display:block}#card.expanded .exp{display:none}
.av{position:relative;width:36px;height:36px;border-radius:9px;flex:0 0 36px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px;overflow:hidden}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.bubble{min-width:0;flex:1}
.bubble .hd{display:flex;align-items:baseline;gap:8px}
.bubble .who{font-weight:800}.bubble .ts{color:var(--dim);font-size:12px}
.bubble .bd{white-space:pre-wrap;word-wrap:break-word;margin-top:1px}
.bubble .bd a{color:#1d9bd1}
.msg-img{max-width:min(360px,100%);max-height:280px;border-radius:8px;margin:6px 0;display:block;border:1px solid var(--edge)}
.bubble code{background:#1e2129;border:1px solid var(--edge);border-radius:5px;padding:1px 5px;font-size:13px}
.bubble pre{background:#1e2129;border:1px solid var(--edge);border-radius:8px;padding:10px;overflow:auto;font-size:13px;margin:0}
.cb{position:relative;margin:6px 0}
.cb .cpy{position:absolute;top:6px;right:6px;background:#2c2f36;color:var(--dim);border:1px solid var(--edge);border-radius:6px;padding:3px 8px;font:11px inherit;font-weight:600;cursor:pointer;opacity:.85}
.cb .cpy:hover{opacity:1;color:var(--txt)}
.cb .cpy.done{color:var(--accent);border-color:var(--accent)}
.sys{color:var(--dim);font-style:italic;font-size:13px;padding:4px 16px}
.row.pending{opacity:.55}.row.pending .ts{font-style:italic}
#cwrap{padding:8px 16px;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
#composer{border:1px solid #565a60;border-radius:10px;background:#222529;display:flex;align-items:flex-end}
#composer textarea{flex:1;background:transparent;border:0;color:var(--txt);font:15px/1.4 inherit;padding:12px;resize:none;max-height:120px;outline:none}
#composer button{background:var(--accent);color:#fff;border:0;border-radius:8px;margin:6px;padding:8px 14px;font-weight:700}
.tags{padding:6px 2px 0;color:var(--dim);font-size:12px}
#hamb{display:none;font-size:20px;background:0;border:0;color:var(--ink)}
#login{position:fixed;inset:0;background:var(--col);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99;gap:12px;padding:24px}
#login.show{display:flex}
#login .card{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
#login h2{margin:0 0 4px;font-size:22px;display:flex;align-items:center;gap:8px}
#login input{background:#222529;border:1px solid #565a60;border-radius:8px;color:var(--txt);font:15px inherit;padding:12px;outline:none}
#login button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:12px;font-weight:700;font-size:15px}
#login .err{color:#e01010;font-size:13px;min-height:16px}
#ac{position:absolute;left:16px;right:16px;bottom:100%;margin-bottom:6px;background:#222529;border:1px solid #565a60;border-radius:10px;max-height:240px;overflow-y:auto;display:none;z-index:20;box-shadow:0 -6px 24px rgba(0,0,0,.4)}
#ac.show{display:block}
.ac-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:14px}
.ac-item.sel{background:var(--active)}
.ac-item .dot{width:12px;height:12px;border-radius:3px;flex:0 0 12px}
.ac-item .sub{color:var(--dim);font-size:12px;margin-left:auto}
#cwrap{position:relative}
@media(max-width:560px){#side{display:none}#chans{position:absolute;z-index:9;height:100%;flex-basis:0;width:0;overflow:hidden;transition:width .2s}#chans.open{width:80vw}#hamb{display:block}}
</style></head><body>
<div id="login"><div class="card">
  <h2><svg style="width:28px;height:28px" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="52" height="52" rx="14" fill="#0d9488"/><path d="M16 44 L32 20 L48 44" stroke="#faf9f7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6"/><circle cx="16" cy="44" r="3.4" fill="#faf9f7"/><circle cx="48" cy="44" r="3.4" fill="#faf9f7"/><circle cx="32" cy="20" r="3.4" fill="#faf9f7"/></svg>stitchpad</h2>
  <input id="lu" placeholder="username" autocapitalize="off" autocomplete="username">
  <input id="lp" type="password" placeholder="password" autocomplete="current-password">
  <button id="lb">Sign in</button>
  <div class="err" id="le"></div>
</div></div>
<div id="app">
  <div id="side"><div class="ws"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="52" height="52" rx="14" fill="#0d9488"/><path d="M16 44 L32 20 L48 44" stroke="#faf9f7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6"/><circle cx="16" cy="44" r="3.4" fill="#faf9f7"/><circle cx="48" cy="44" r="3.4" fill="#faf9f7"/><circle cx="32" cy="20" r="3.4" fill="#faf9f7"/></svg></div></div>
  <div id="chans">
    <h1><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="52" height="52" rx="14" fill="#0d9488"/><path d="M16 44 L32 20 L48 44" stroke="#faf9f7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6"/><circle cx="16" cy="44" r="3.4" fill="#faf9f7"/><circle cx="48" cy="44" r="3.4" fill="#faf9f7"/><circle cx="32" cy="20" r="3.4" fill="#faf9f7"/></svg>stitchpad</h1>
    <div class="sect">Stitchpads</div>
    <div id="chanlist"></div>
    <div class="sect">Direct Messages</div>
    <div id="dmlist"></div>
  </div>
  <div id="main">
    <div id="top"><button id="hamb">☰</button><span class="name" id="chTitle"># …</span><span class="meta" id="chMeta"></span></div>
    <div id="statusbar"></div>
    <div id="claimbar"></div>
    <div id="log"></div>
    <div id="cwrap"><div id="ac"></div><div id="composer"><textarea id="text" rows="1" placeholder="Message…"></textarea><button id="send">➤</button></div><div class="tags" id="tags">you are @smaths · type @name to address agents</div></div>
  </div>
</div>
<div id="cardback"></div>
<div id="card"></div>
<script>
const RELAY=location.origin;
// Identity follows the handle you logged in with (persisted), not a hardcoded name.
// Auth is still the shared token; this makes attribution + colors dynamic per user.
let me=localStorage.getItem("sp_me")||"smaths";
let TOKEN=localStorage.getItem("sp_token")||"";
let pad=localStorage.getItem("sp_pad")||"";
const api=(p,o={})=>fetch(RELAY+p,{...o,headers:{authorization:"Bearer "+TOKEN,"content-type":"application/json",...(o.headers||{})}});
// SINGLE SOURCE OF TRUTH: colors come from the relay's pad.colors (= `stitchpad
// color --all`, override-aware). The local OVR/PAL below is ONLY an offline fallback
// for when /pad hasn't loaded yet — so the web client can't drift from the terminals.
const OVR={smaths:"#f5f5f5",randy:"#0d9488",dale:"#00d000",larry:"#e01010",ernie:"#9b30ff",dennis:"#ff8c00",Jill:"#ff1493",mark:"#ffd700"};
const PAL=["#00afff","#ff8700","#5fff00","#d75fff","#ffaf00","#00ffff","#ff00af","#ffd700","#87ffff","#af87ff","#ff5faf","#5fff5f","#ff5fff","#87d787","#d7af5f","#ffff00","#5fffff","#ff87ff","#afffaf","#afffff"];
let RELAY_COLORS={};   // name->hex from the latest /pad fetch (the source of truth)
// Accept either shape the relay might send: flat {name:hex} OR [{name,color}].
function setRelayColors(c){
  const m={};
  if(Array.isArray(c)) c.forEach(e=>{if(e&&e.name)m[e.name]=e.color||e.hex;});
  else if(c&&typeof c==="object") Object.assign(m,c);
  RELAY_COLORS=m;
}
const colorFor=n=>RELAY_COLORS[n]||OVR[n]||PAL[[...(n||"")].reduce((s,c)=>s+c.charCodeAt(0),0)%PAL.length];
// readable text/name color: dark ink on light backgrounds (e.g. smaths=white), else the color itself
const lum=h=>{const c=h.replace("#","");const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);return(0.299*r+0.587*g+0.114*b)/255;};
const onLight=n=>lum(colorFor(n))>0.85;          // true when the author color is near-white
const nameColor=n=>onLight(n)?"#e8e8e9":colorFor(n);   // name reads on dark chat
const initInk=n=>onLight(n)?"#1a1d29":"#fff";          // initials read on the avatar square
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const initials=n=>(n||"?").slice(0,2).toUpperCase();
// avatar: show avatars/<name>.png if it loads, else fall back to colored initials square.
const av=n=>`<div class="av card-trigger" data-agent="${esc(n)}" style="background:${colorFor(n)};color:${initInk(n)}"><img src="avatars/${encodeURIComponent(n)}.png" alt="" onerror="this.onerror=null;this.src='avatars/_default.png'"><span>${initials(n)}</span></div>`;
function fmt(t){
  t=esc(t);
  t=t.replace(/```([\s\S]*?)```/g,(m,c)=>`<div class="cb"><button class="cpy" title="copy">copy</button><pre>${c.trim()}</pre></div>`);
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  // markdown image — ONLY ![alt](http(s)://...) → <img>. Anchored to http(s) URLs so
  // no js:/data: src; alt is already entity-escaped by esc() above (no HTML breakout).
  // Must run BEFORE the autolink so the url inside ()s isn't turned into an <a> first.
  // ponytail: remote-img beacon (viewer IP) accepted for v0; relay-proxy /img?u= later.
  t=t.replace(/!\[([^\]]*)\]\((https?:\/\/[^\s)]+)\)/g,(m,alt,url)=>`<img class="msg-img" src="${url}" alt="${alt}" loading="lazy" referrerpolicy="no-referrer">`);
  t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  t=t.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  t=t.replace(/(^|[\s(])@([a-zA-Z0-9_-]+)/g,(m,p,n)=>`${p}<b style="color:${colorFor(n)}">@${n}</b>`);
  return t;
}
async function loadPads(){
  const r=await api("/pads"); if(!r.ok){document.getElementById("chMeta").textContent="auth?";return;}
  const pads=await r.json(); const cl=document.getElementById("chanlist"); cl.innerHTML="";
  if(!pad&&pads[0])pad=pads[0].name;
  pads.forEach(p=>{const d=document.createElement("div");d.className="chan"+(p.name===pad?" on":"");
    d.innerHTML=`<span class="h">#</span>${esc(p.name)}`;
    d.onclick=()=>{pad=p.name;dmWith="";localStorage.removeItem("sp_dm");localStorage.setItem("sp_pad",pad);document.getElementById("chans").classList.remove("open");render();loadPads();};
    cl.appendChild(d);});
}
function parse(md){const out=[];let cur=null;
  for(const line of (md||"").split("\n")){
    let m=line.match(/^##\s+@(\S+)\s+·\s+(.+)$/);
    if(m){if(cur)out.push(cur);cur={who:m[1],t:m[2],body:[]};continue;}
    let s=line.match(/^\*(.+?)·.+\*$/);
    if(s){if(cur){out.push(cur);cur=null;}out.push({sys:s[1].trim()});continue;}
    if(cur)cur.body.push(line);
  } if(cur)out.push(cur); return out;}
// DM v0: a filtered view of the same pad — the me<->X back-and-forth. A block
// belongs if it's authored by me or X AND it addresses/concerns the other (or is
// an undirected line between us). Mirrors the terminal chat into a 1:1 view.
function inDM(b,x){
  const a=(b.who||"").toLowerCase(), meL=me.toLowerCase(), xL=x.toLowerCase();
  if(a!==meL && a!==xL) return false;            // only me or them
  const body=(b.body||[]).join(" ").toLowerCase();
  const other=(a===meL)?xL:meL;                  // who this author would be talking to
  const mentions=n=>new RegExp("(^|[^a-z0-9_-])@"+n+"([^a-z0-9_-]|$)").test(body);
  // keep if it @-addresses the other party, or addresses nobody (undirected aside)
  return mentions(other) || !/(^|[^a-z0-9_-])@[a-z0-9_-]/.test(body);
}
async function render(){
  if(!pad)return;
  const r=await api("/pad?pad="+encodeURIComponent(pad)); if(!r.ok)return; const d=await r.json();
  document.getElementById("chTitle").textContent=dmWith?("@"+dmWith):("# "+pad);
  setRelayColors(d.colors);   // single source of truth — relay's stitchpad-color table
  ROSTER=(d.roster||[]).map(m=>m.name); FILES=d.files||[];
  ROSTER_INFO={}; (d.roster||[]).forEach(m=>{ROSTER_INFO[m.name]=m;}); PROFILES=d.profiles||{};  // for agent cards
  CLAIMS=d.claims||[];
  renderDMList(); renderStatusBar(); renderClaimBar();
  document.getElementById("chMeta").textContent=dmWith?"direct message":((d.roster||[]).length+" members");
  const log=document.getElementById("log"), atBottom=log.scrollHeight-log.scrollTop-log.clientHeight<80;
  let msgs=parse(d.pad);
  if(dmWith) msgs=msgs.filter(b=>!b.sys && inDM(b,dmWith));   // 1:1 filtered view
  // drop optimistic pending messages that have now landed in the real pad
  const landed=new Set(msgs.map(b=>(b.body||[]).join("\n").trim()));
  PENDING=PENDING.filter(p=>!landed.has(p.text));
  const cpyBtn=text=>`<button class="row-cpy" title="copy message" data-copy="${btoa(unescape(encodeURIComponent(text)))}">copy</button>`;
  const rowHtml=b=>`<div class="row">${cpyBtn(b.body.join("\n").trim())}${av(b.who)}<div class="bubble"><div class="hd"><span class="who card-trigger" data-agent="${esc(b.who)}" style="color:${nameColor(b.who)}">${esc(b.who)}</span><span class="ts">${esc(b.t)}</span></div><div class="bd">${fmt(b.body.join("\n").trim())}</div></div></div>`;
  const pendHtml=p=>`<div class="row pending">${av(me)}<div class="bubble"><div class="hd"><span class="who" style="color:${nameColor(me)}">${esc(me)}</span><span class="ts">sending…</span></div><div class="bd">${fmt(p.text)}</div></div></div>`;
  log.innerHTML=msgs.map(b=>b.sys?`<div class="sys">${esc(b.sys)}</div>`:rowHtml(b)).join("")+PENDING.map(pendHtml).join("");
  if(atBottom)log.scrollTop=log.scrollHeight;
}
let ROSTER=[],FILES=[],PENDING=[],ROSTER_INFO={},PROFILES={},CLAIMS=[],dmWith="";
// File-write claims telemetry: "✏️ @x editing <file>" — shows who holds a write
// lease so we can SEE the locks. Reads pad.claims (from `stitchpad claims` via bridge).
// Tolerant of shape: [{holder,file,age}] or {file:holder}.
function renderClaimBar(){
  const el=document.getElementById("claimbar"); if(!el)return;
  let list=[];
  if(Array.isArray(CLAIMS)) list=CLAIMS.map(c=>({who:c.holder||c.name||c.who,file:c.file||c.path,age:c.age}));
  else if(CLAIMS&&typeof CLAIMS==="object") list=Object.entries(CLAIMS).map(([file,who])=>({who,file}));
  list=list.filter(c=>c.who&&c.file);
  el.innerHTML=list.map(c=>`<span class="claim">✏️ <b style="color:${colorFor(c.who)}">@${esc(c.who)}</b> editing ${esc(c.file)}${c.age?` · ${esc(String(c.age))}`:""}</span>`).join("");
}
// Direct Messages list in the sidebar (below Stitchpads). Tap an agent → DM view.
function renderDMList(){
  const el=document.getElementById("dmlist"); if(!el)return;
  el.innerHTML=ROSTER.filter(n=>n!==me).map(n=>{
    const st=ROSTER_INFO[n]||{}, online=(st.status==="online"||st.live==="online");
    const dot=`<span class="sdot" style="background:${online?"#2ea043":"#6b7280"}"></span>`;
    return `<div class="chan dm-item${dmWith===n?" on":""}" data-dm="${esc(n)}">`+
      `<div class="dmav" style="background:${colorFor(n)};color:${initInk(n)}"><img src="avatars/${encodeURIComponent(n)}.png" alt="" onerror="this.remove()"><span>${initials(n)}</span></div>`+
      `${dot}${esc(n)}</div>`;
  }).join("");
}
function openDM(n){dmWith=n;localStorage.setItem("sp_dm",n);document.getElementById("chans").classList.remove("open");render();}
function closeDM(){dmWith="";localStorage.removeItem("sp_dm");render();}
// Presence strip under the header: count + a row of colored status dots (tap → card).
// status from PROFILES[name].status: dnd | working | available (idle→available).
function renderStatusBar(){
  const el=document.getElementById("statusbar"); if(!el)return;
  const agents=ROSTER.filter(n=>PROFILES[n]||ROSTER_INFO[n]);
  if(!agents.length){el.innerHTML="";return;}
  let working=0,avail=0,dnd=0;
  const dots=agents.map(n=>{
    const st=(PROFILES[n]||{}).status||"available";
    if(st==="working")working++; else if(st==="dnd")dnd++; else avail++;
    const title=`@${n} · ${st}`;
    return `<span class="sb-dot card-trigger ${st}" data-agent="${esc(n)}" title="${esc(title)}" style="background:${colorFor(n)}"></span>`;
  }).join("");
  const parts=[]; if(working)parts.push(working+" working"); if(avail)parts.push(avail+" available"); if(dnd)parts.push(dnd+" dnd");
  el.innerHTML=`<span class="count">${parts.join(" · ")||agents.length+" agents"}</span><span class="dots">${dots}</span>`;
}
const ta=document.getElementById("text"),acEl=document.getElementById("ac");
let ac={open:false,kind:null,start:0,items:[],sel:0};

function autosize(){ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,120)+"px";}
function closeAc(){ac.open=false;acEl.classList.remove("show");acEl.innerHTML="";}
function renderAc(){
  if(!ac.items.length){closeAc();return;}
  ac.open=true;acEl.classList.add("show");
  acEl.innerHTML=ac.items.map((it,i)=>ac.kind==="@"
    ? `<div class="ac-item${i===ac.sel?" sel":""}" data-i="${i}"><span class="dot" style="background:${colorFor(it)}"></span>@${esc(it)}</div>`
    : `<div class="ac-item${i===ac.sel?" sel":""}" data-i="${i}">${esc(it)}</div>`).join("");
  acEl.querySelectorAll(".ac-item").forEach(el=>el.onclick=()=>{ac.sel=+el.dataset.i;applyAc();});
  const s=acEl.querySelector(".sel"); if(s)s.scrollIntoView({block:"nearest"});
}
// find an "@word" or ">word" token ending at the caret
function activeToken(){
  const c=ta.selectionStart,before=ta.value.slice(0,c);
  const m=before.match(/(^|[\s])([@>])([a-zA-Z0-9_./-]*)$/);
  if(!m)return null;
  return {kind:m[2],q:m[3],start:c-m[3].length-1};
}
function updateAc(){
  const t=activeToken();
  if(!t){closeAc();return;}
  ac.kind=t.kind;ac.start=t.start;ac.sel=0;
  const q=t.q.toLowerCase();
  if(t.kind==="@"){
    const names=["all",...ROSTER.filter(n=>n!==me)];
    ac.items=names.filter(n=>n.toLowerCase().startsWith(q)).slice(0,12);
  }else{
    ac.items=FILES.filter(f=>f.toLowerCase().includes(q)).slice(0,12);
  }
  renderAc();
}
function applyAc(){
  if(!ac.open||!ac.items.length)return;
  const pick=ac.items[ac.sel];
  const ins=(ac.kind==="@"?"@"+pick:pick)+" ";
  const after=ta.value.slice(ta.selectionStart);
  ta.value=ta.value.slice(0,ac.start)+ins+after;
  const pos=ac.start+ins.length;ta.setSelectionRange(pos,pos);
  closeAc();autosize();ta.focus();
}
ta.addEventListener("input",()=>{autosize();updateAc();});
ta.addEventListener("click",updateAc);
ta.addEventListener("blur",()=>setTimeout(closeAc,150));

async function send(){let text=ta.value.trim();if(!text||!pad)return;ta.value="";autosize();closeAc();
  // in a DM, address the agent so the message lands in the 1:1 view (and wakes them)
  if(dmWith && !new RegExp("(^|[^a-z0-9_-])@"+dmWith+"([^a-z0-9_-]|$)","i").test(text)) text="@"+dmWith+" "+text;
  PENDING.push({text});                         // optimistic: show immediately
  const log=document.getElementById("log");
  log.insertAdjacentHTML("beforeend",`<div class="row pending">${av(me)}<div class="bubble"><div class="hd"><span class="who" style="color:${nameColor(me)}">${esc(me)}</span><span class="ts">sending…</span></div><div class="bd">${fmt(text)}</div></div></div>`);
  log.scrollTop=log.scrollHeight;
  await api("/say?pad="+encodeURIComponent(pad),{method:"POST",body:JSON.stringify({from:me,text})});setTimeout(render,400);}
document.getElementById("send").onclick=send;
ta.addEventListener("keydown",e=>{
  if(ac.open){
    if(e.key==="ArrowDown"){e.preventDefault();ac.sel=(ac.sel+1)%ac.items.length;renderAc();return;}
    if(e.key==="ArrowUp"){e.preventDefault();ac.sel=(ac.sel-1+ac.items.length)%ac.items.length;renderAc();return;}
    if(e.key==="Tab"||(e.key==="Enter"&&!e.shiftKey)){e.preventDefault();applyAc();return;}
    if(e.key==="Escape"){e.preventDefault();closeAc();return;}
  }
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});
document.getElementById("hamb").onclick=()=>document.getElementById("chans").classList.toggle("open");
document.getElementById("log").addEventListener("click",e=>{
  // whole-message copy button (top-right of each row)
  const rb=e.target.closest(".row-cpy");
  if(rb){
    const text=decodeURIComponent(escape(atob(rb.dataset.copy||"")));
    navigator.clipboard.writeText(text).then(()=>{rb.textContent="copied";rb.classList.add("done");
      setTimeout(()=>{rb.textContent="copy";rb.classList.remove("done");},1400);});
    return;
  }
  // code-block copy button
  const b=e.target.closest(".cpy"); if(!b)return;
  const code=b.parentElement.querySelector("pre").innerText;
  navigator.clipboard.writeText(code).then(()=>{b.textContent="copied";b.classList.add("done");
    setTimeout(()=>{b.textContent="copy";b.classList.remove("done");},1400);});
});
const loginEl=document.getElementById("login"),le=document.getElementById("le");
document.getElementById("dmlist").addEventListener("click",e=>{const t=e.target.closest(".dm-item");if(t)openDM(t.dataset.dm);});
function startApp(){loginEl.classList.remove("show");setMe(me);dmWith=localStorage.getItem("sp_dm")||"";loadPads();render();setInterval(render,3000);setInterval(loadPads,15000);}
function setMe(name){me=name||"smaths";localStorage.setItem("sp_me",me);
  const t=document.getElementById("tags");if(t)t.textContent="you are @"+me+" · type @name to address agents";}
async function doLogin(){const user=document.getElementById("lu").value.trim(),pass=document.getElementById("lp").value;le.textContent="";
  const r=await fetch(RELAY+"/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({user,pass})});
  if(!r.ok){le.textContent="wrong username or password";return;}
  TOKEN=(await r.json()).token;localStorage.setItem("sp_token",TOKEN);setMe(user);startApp();}
document.getElementById("lb").onclick=doLogin;
document.getElementById("lp").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
if(TOKEN)startApp(); else loginEl.classList.add("show");
if("serviceWorker"in navigator)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));

// ── Agent cards ──────────────────────────────────────────────
// Click a name/avatar → popover card. v1 renders off what the PWA already has
// (name, color, avatar, harness from roster); role/persona/skills/model fill in
// once the bridge pushes a `profiles` blob (PROFILES[name]). Graceful if absent.
const cardEl=document.getElementById("card"),cardBack=document.getElementById("cardback");
function agentCard(name){
  const info=ROSTER_INFO[name]||{}, prof=PROFILES[name]||{};
  const col=colorFor(name), ink=initInk(name);
  const harness=prof.harness||info.adapter||"—";
  const model=prof.model||"—";
  const role=prof.role||"";
  const skills=Array.isArray(prof.skills)?prof.skills:[];
  const ctx=prof.context||"";
  const pfp=`<div class="pfp" style="background:${col};color:${ink}"><img src="avatars/${encodeURIComponent(name)}.png" alt="" onerror="this.remove()">${initials(name)}</div>`;
  const chips=[harness!=="—"?`<span class="chip">${esc(harness)}</span>`:"",model!=="—"?`<span class="chip">${esc(model)}</span>`:"",ctx?`<span class="chip">${esc(ctx)}</span>`:""].join("");
  const full=`<div class="full">`+
    (role?`<div class="sec"><h4>Role</h4>${esc(role)}</div>`:"")+
    (prof.persona?`<div class="sec"><h4>Persona</h4><div class="persona">${esc(prof.persona)}</div></div>`:"")+
    (skills.length?`<div class="sec"><h4>Skills</h4>${skills.map(s=>`<div class="skill"><b>${esc(s.name||s)}</b>${s.desc?" — "+esc(s.desc):""}</div>`).join("")}</div>`:"")+
    (!role&&!prof.persona&&!skills.length?`<div class="sec" style="color:var(--dim)">Full profile not pushed yet (bridge \`profiles\` blob pending).</div>`:"")+
    `</div>`;
  return `<div class="top" style="background:${col}"></div><div class="body">`+
    pfp+
    `<div class="nm" style="color:${nameColor(name)}">@${esc(name)}</div>`+
    (role?`<div class="role">${esc(role)}</div>`:"")+
    (chips?`<div class="meta">${chips}</div>`:"")+
    full+
    `<button class="exp">View full profile ▾</button>`+
    `</div>`;
}
function openCard(name,x,y){
  cardEl.innerHTML=agentCard(name);
  cardEl.classList.remove("expanded");
  cardEl.classList.add("show");cardBack.classList.add("show");
  // position near the click, clamped to viewport
  const r=cardEl.getBoundingClientRect();
  let px=Math.min(x,window.innerWidth-r.width-12), py=Math.min(y,window.innerHeight-r.height-12);
  cardEl.style.left=Math.max(12,px)+"px";cardEl.style.top=Math.max(12,py)+"px";
}
function closeCard(){cardEl.classList.remove("show","expanded");cardBack.classList.remove("show");}
cardBack.onclick=closeCard;
cardEl.addEventListener("click",e=>{ if(e.target.closest(".exp")) cardEl.classList.add("expanded"); });
document.addEventListener("click",e=>{
  const t=e.target.closest(".card-trigger"); if(!t)return;
  e.stopPropagation();
  openCard(t.dataset.agent, e.clientX+8, e.clientY+8);
});
</script></body></html>
