name = "stitchpad-relay"
main = "worker.js"
compatibility_date = "2026-06-01"

routes = [
  { pattern = "stitchpad.agentsworld.org", custom_domain = true },
  { pattern = "pasture.agentsworld.org", custom_domain = true }
]

# wrangler kv namespace create STITCHPAD  → paste id below
[[kv_namespaces]]
binding = "STITCHPAD"
id = "7ffd9a8d445e467ab7ce622a6c197b5a"

# PadHub — one Durable Object per pad: hot pad doc + websocket fan-out.
[[durable_objects.bindings]]
name = "PADHUB"
class_name = "PadHub"

[[migrations]]
tag = "v1-padhub"
new_sqlite_classes = ["PadHub"]

# R2 bucket for image attachments
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "stitchpad-images"

# Serve the PWA static files at the root; API routes still handled by worker.js
[assets]
directory = "../pwa"
binding = "ASSETS"
not_found_handling = "single-page-application"
